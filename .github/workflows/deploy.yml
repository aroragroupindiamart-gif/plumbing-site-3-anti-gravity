# ============================================================
# GitHub Actions — Build & Deploy to Cloudflare Pages
# ============================================================
# Required GitHub repository secrets (Settings → Secrets and variables → Actions):
#
#   CLOUDFLARE_API_TOKEN  — dash.cloudflare.com/profile/api-tokens
#                           Use the "Edit Cloudflare Pages" template
#   CLOUDFLARE_ACCOUNT_ID — right sidebar of dash.cloudflare.com
#
#   NEXT_PUBLIC_BRAND_NAME       e.g. "Ace Plumbing"
#   NEXT_PUBLIC_PHONE_NUMBER     e.g. "(800) 123-4567"
#   NEXT_PUBLIC_PHONE_TEL        e.g. "8001234567"
#   NEXT_PUBLIC_SITE_URL         e.g. "https://aceplumbing.com"
#   NEXT_PUBLIC_NICHE            e.g. "Plumbing"
#   NEXT_PUBLIC_NICHE_PLURAL     e.g. "Plumbers"
#   NEXT_PUBLIC_NICHE_SINGULAR   e.g. "Plumber"
#   NEXT_PUBLIC_SCHEMA_TYPE      e.g. "Plumber"
#
# Optional secrets (leave blank to skip):
#   NEXT_PUBLIC_GA_ID            Google Analytics 4 measurement ID
#   NEXT_PUBLIC_ADSENSE_ID       Google AdSense publisher ID
#   NEXT_PUBLIC_GSC_TOKEN        Google Search Console verification token
#   NEXT_PUBLIC_CONTENT_SALT     Per-site content variant offset (see lib/spintax.ts).
#                                Leave unset/0 for the original template site.
# ============================================================

name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build for Cloudflare Workers
        run: pnpm run build:cf
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"
          NEXT_PUBLIC_BRAND_NAME: ${{ secrets.NEXT_PUBLIC_BRAND_NAME }}
          NEXT_PUBLIC_PHONE_NUMBER: ${{ secrets.NEXT_PUBLIC_PHONE_NUMBER }}
          NEXT_PUBLIC_PHONE_TEL: ${{ secrets.NEXT_PUBLIC_PHONE_TEL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_NICHE: ${{ secrets.NEXT_PUBLIC_NICHE }}
          NEXT_PUBLIC_NICHE_PLURAL: ${{ secrets.NEXT_PUBLIC_NICHE_PLURAL }}
          NEXT_PUBLIC_NICHE_SINGULAR: ${{ secrets.NEXT_PUBLIC_NICHE_SINGULAR }}
          NEXT_PUBLIC_SCHEMA_TYPE: ${{ secrets.NEXT_PUBLIC_SCHEMA_TYPE }}
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_ADSENSE_ID: ${{ secrets.NEXT_PUBLIC_ADSENSE_ID }}
          NEXT_PUBLIC_GSC_TOKEN: ${{ secrets.NEXT_PUBLIC_GSC_TOKEN }}
          NEXT_PUBLIC_CONTENT_SALT: ${{ secrets.NEXT_PUBLIC_CONTENT_SALT }}

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
